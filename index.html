<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>д»ҠеӨ©еҗғд»Җд№Ҳ рҹҚң</title>
  <style>
    :root{--pink:#E8537A;--pink-light:#FFF0F4;--card:#fff;--bg:#FDF6F8;--text:#2D1520;--text-soft:#9E7080;--r:20px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
    .hero{background:linear-gradient(135deg,#F48FB1,#E8537A);padding:32px 20px 24px;text-align:center;color:#fff}
    .hero-icon{font-size:48px}.hero h1{font-size:28px;font-weight:700;margin:8px 0 4px}.hero p{font-size:14px;opacity:.9}
    .sync-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;font-size:13px;color:var(--text-soft);background:#fff;border-bottom:1px solid #f0e0e6}
    .dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
    .dot.ok{background:#4CAF50}.dot.loading{background:#FF9800;animation:pulse 1s infinite}.dot.error{background:#f44336}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .page{display:none;padding:16px}.page.active{display:block}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .card-dish{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:0 2px 12px rgba(232,83,122,.08)}
    .thumb{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--pink-light);font-size:48px;overflow:hidden}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .dinfo{padding:10px 12px}.dname{font-size:15px;font-weight:600}.dprefs{font-size:12px;color:var(--text-soft);margin-top:4px}
    .qty-row{display:flex;align-items:center;justify-content:space-between;podding:8px 12px 12px}
    .qbtn{width:32px;height:32px;border-radius:50%;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .qbtn.m{background:#f0e0e6;color:var(--pink)}.qbtn.p{background:var(--pink);color:#fff}
    .qnum{font-size:16px;font-weight:600;min-width:24px;text-align:center}
    .submit-wrap{position:fixed;bottom:72px;left:0;right:0;padding:0 16px;pointer-events:none}
    .submit-btn{width:100%;background:var(--pink);color:#fff;border:none;border-radius:50px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;pointer-events:all;box-shadow:0 4px 20px rgba(232,83,122,.4);display:none}
    .empty{text-align:center;padding:60px 20px;color:var(--text-soft)}
    .empty-icon{font-size:56px;display:block;margin-bottom:12px}
    .admin-hero{background:linear-gradient(135deg,#2D1520,#5D2B3E);padding:24px 20px;text-align:center;color:#fff}
    .admin-hero h2{font-size:20px;font-weight:700}.admin-hero p{font-size:12px;opacity:.7;margin-top:4px}
    .card{background:#fff;border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .card-title{font-size:15px;font-weight:700;margin-bottom:12px}
    .fl{font-size:13px;color:var(--text-soft);margin-bottom:6px;display:block}
    .fi{width:100%;border:1.5px solid #f0e0e6;border-radius:12px;padding:10px 14px;font-size:15px;outline:none;background:var(--pink-light)}
    .fi:focus{border-color:var(--pink)}.fr{margin-bottom:12px}
    .emoji-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
    .eopt{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;background:var(--pink-light);border:2px solid transparent}
    .eopt.sel{border-color:var(--pink);background:#fff}
    .upload-label{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--pink-light);border:1.5px dashed var(--pink);border-radius:12px;cursor:pointer;font-size:14px;color:var(--pink)}
    .img-preview{width:60px;height:60px;border-radius:12px;object-fit:cover;display:none;margin-top:8px}
    .pref-row{display:flex;gap:8px;margin-bottom:8px}
    .pref-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
    .ptag{background:var(--pink-light);color:var(--pink);border-radius:20px;padding:4px 10px;font-size:13px;display:flex;align-items:center;gap:4px}
    .ptag-del{cursor:pointer;font-size:16px;line-height:1}
    .qprefs{display:flex;flex-wrap:wrap;gap:6px}
    .qpref{background:#f5f5f5;border-radius:20px;padding:4px 10px;font-size:13px;cursor:pointer}
    .btn{border:none;border-radius:50px;padding:12px 24px;font-size:15px;font-weight:600;cursor:pointer;width:100%}
    .btn-pink{background:var(--pink);color:#fff}
    .bsm{border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
    .bsm-pink{background:var(--pink);color:#fff}.bsm-out{background:#fff;color:var(--pink);border:1.5px solid var(--pink)}
    .dai{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0e0e6}
    .dai:last-child{border-bottom:none}
    .da-thumb{width:48px;height:48px;border-radius:12px;background:var(--pink-light);display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;flex-shrink:0}
    .da-thumb img{width:100%;height:100%;object-fit:cover}
    .da-info{flex:1;min-width:0}.da-name{font-weight:600;font-size:15px}.da-prefs{font-size:12px;color:var(--text-soft);margin-top:2px}
    .btn-del{background:none;border:none;font-size:20px;cursor:pointer;color:#ccc;padding:4px;flex-shrink:0}
    .nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f0e0e6;display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:100}
    .nbtn{flex:1;border:none;background:none;padding:10px 0 6px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:#ccc;font-size:12px}
    .nbtn.active{color:var(--pink)}.nicon{font-size:24px}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(45,21,32,.9);color:#fff;padding:10px 20px;border-radius:50px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1}
    .sk-row{display:flex;gap:8px}.sk-row .fi{flex:1}
  </style>
</head>
<body>

<div class="page active" id="page-menu">
  <div class="hero"><div class="hero-icon">рҹҚң</div><h1>д»ҠеӨ©еҗғд»Җд№Ҳ/h1><p>йҖүеҘөдҪ жғіиҘҒзҡ„пјҢд»–жңҘеё®дҪ еҒҡ рҹҘ°а</p></div>
  <div class="sync-bar"><div class="dot" id="syncDot"></div><span id="syncMsg">еҠ иҪҪдёӯвҖҰ</span></div>
  <div style="padding:16px"><div class="grid" id="menuGrid"></div></div>
</div>

<div class="page" id="page-admin">
  <div class="admin-hero"><h2>рҹ‘ЁвҖҚрҹҚі еҗҺеҸ°з®ЎзҗҶ</h2><p>еҸӘжңүдҪ иғҪзңӢеҲ°иҝҷйҮҢ</p></div>
  <div style="padding:16px">
    <div class="card">
      <div class="card-title">рҹ“ұ еҫ®дҝЎжҺЁйҖҒпјҲServerй…ұпјү</div>
      <div class="fr">
        <label class="fl">SendKey</label>
        <div class="sk-row">
          <input class="fi" id="skInput" placeholder="SCTвҖҰ">
          <button class="bsm bsm-pink" onclick="saveSK()">дҝқеӯҳ</button>
          <button class="bsm bsm-out" onclick="testSK()">жөӢиҜ•</button>
        </div>
        <div id="skStatus" style="font-size:12px;color:var(--text-soft);margin-top:6px"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">+ ж·»еҠ иҸңе“Ғ</div>
      <div class="fr"><label class="fl">иҸңе“ҒеҗҚз§°</label><input class="fi" id="dishName" placeholder="жҜ”еҰӮпјҡзәўзғ§иӮүгҖҒз•ӘиҢ„зӮ’иӣӢвҖҰ"></div>
      <div class="fr">
        <label class="fl">еӣҫж Ү</label>
        <div class="emoji-row" id="emojiRow"></div>
        <label class="upload-label"><span>рҹ“·</span><span id="uploadLabel">жҲ–дёҠдј еӣҫзүҮ</span><input type="file" accept="image/*" style="display:none" id="imgFileInput" onchange="handleImgUpload(this)"></label>
        <img id="imgPreview" class="img-preview">
      </div>
      <div class="fr">
        <label class="fl">еҸЈе‘іеҒҸеҘҪйҖүйЎ№</label>
        <div class="pref-row"><input class="fi" id="prefInput" placeholder="жҜ”еҰӮпјҡе…Қи‘ұиҠұ" onkeydown="if(event.key==='Enter')addPref()"><button class="bsm bsm-pink" onclick="addPref()">ж·»еҠ </button></div>
        <div class="pref-tags" id="buildPrefsList"></div>
        <div class="qprefs">
          <span class="qpref" onclick="quickAddPref('е…Қи‘ұиҠұ')">е…Қи‘ұиҠұ</span>
          <span class="qpref" onclick="quickAddPref('е…ҚйҰҷиҸң')">е…ҚйҰҷиҸң</span>
          <span class="qpref" onclick="quickAddPref('еҠ иҫЈ')">еҠ иҫЈ</span>
          <span class="qpref" onclick="quickAddPref('е°‘иҫЈ')">е°‘иҫЈ</span>
          <span class="qpref" onclick="quickAddPref('дёҚиҫЈ')">дёҚиҫЈ</span>
          <span class="qpref" onclick="quickAddPref('е°‘зӣҗ')">е°‘зӣҗ</span>
          <span class="qpref" onclick="quickAddPref('е°‘жІ№')">е°‘жІ№</span>
          <span class="qpref" onclick="quickAddPref('еҠ и’ң')">еҠ и’ң</span>
        </div>
      </div>
      <button class="btn btn-pink" onclick="addDish()">еҠ е…ҘиҸңеҚ• вҳҒпёҸ иҮӘеҠЁеҗҢжӯҘ</button>
    </div>
    <div class="card"><div class="card-title">рҹ“Ӣ еҪ“еүҚиҸңеҚ•</div><div id="dishListAdmin"></div></div>
  </div>
</div>

<nav class="nav">
  <button class="nbtn active" id="navMenu" onclick="showPage('menu')"><span class="nicon">рҹҚҪпёҸ</span><span>иҸңеҚ•</span></button>
  <button class="nbtn" id="navAdmin" onclick="showPage('admin')"><span class="nicon">рҹ‘ЁвҖҚрҹҚі</span><span>з®ЎзҗҶ</span></button>
</nav>
<div class="submit-wrap"><button class="submit-btn" id="submitBtn" onclick="submitOrder()">рҹӣҺпёҸ е‘ҠиҜүд»–жҲ‘иҰҒеҗғиҝҷдәӣ</button></div>
<div class="toast" id="toast"></div>

<script>
const BIN_URL='https://api.jsonbin.io/v3/b/69cf536236566621a8755e35';
const MASTER_KEY='$2a$10$VFkj5Dl8SWCh9n16NClmyO49tS9P54oTS3CZ5rYXIjK7OvvKHoa9W';
const HEADERS={'Content-Type':'application/json','X-Master-Key':MASTER_KEY};
const SK_KEY='mymenu_sendkey';
const DEFAULT_SK='SCT333500TNOeqvOwysfdYCven8FfOM6Sb';
const EMOJIS=['рҹҚң','рҹҚҡ','рҹҚі','рҹҘ©','рҹҗҹ','рҹҚӨ','рҹҚІ','рҹҘ—','рҹҚұ','рҹҘҹ','рҹҚ•','рҹҢ®','рҹҘҡ','рҹҚө','рҹҘҰ','рҹҚ–'];
let dishes=[],orders={},pendingImg=null,buildingPrefs=[];
function getSK(){return localStorage.getItem(SK_KEY)||DEFAULT_SK;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function setSyncStatus(s,msg){document.getElementById('syncDot').className='dot '+s;document.getElementById('syncMsg').textContent=msg;}
function showPage(p){document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');document.querySelectorAll('.nbtn').forEach(el=>el.classList.remove('active'));document.getElementById(p==='menu'?'navMenu':'navAdmin').classList.add('active');if(p==='admin'){renderAdmin();const s=localStorage.getItem(SK_KEY);if(s)document.getElementById('skInput').value=s;}}
async function loadFromCloud(){setSyncStatus('loading','еҗҢжӯҘдёӯвҖҰ');const cached=JSON.parse(localStorage.getItem('cached_dishes')||'[]');if(cached.length>0){dishes=cached;renderMenu();setSyncStatus('ok','иҸңеҚ•е·ІеҗҢжӯҘ В· '+dishes.length+' йҒ“иҸң');}const res=await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':MASTER_KEY}}).catch(()=>null);if(res){const data=await res.json();dishes=data.record.dishes||[];orders=data.record.orders||{};localStorage.setItem('cached_dishes',JSON.stringify(dishes));setSyncStatus('ok','иҸңеҚ•е·ІйҖҡе·І '+dishes.length+'йҒ“иҸң');renderMenu();}else{setSyncStatus('error','зҰ»зәҝжӘЎејҸ');if(dishes.length===0)renderMenu();}}
async function saveToCloud(){setSyncStatus('loading','дҝқеӯҳдёӯвҖҰ');localStorage.setItem('cached_dishes',JSON.stringify(dishes));const res=await fetch(BIN_URL,{method:'PUT',headers:HEADERS,body:JSON.stringify({dishes,orders})}).catch(()=>null);if(res&&res.ok){setSyncStatus('ok','е·Ідҝқеӯҳ В· '+dishes.length+'йҒ“иҸң');}else{setSyncStatus('error','дҝқеӯҳеӨұиҙҘ');}}
function renderMenu(){const g=document.getElementById('menuGrid');if(!dishes.length){g.innerHTML='<div class="empty" style="grid-column:span 2"><span class="empty-icon">рҹҚҝпёҸ</span><p>иҝҳжІЎжңүиҸңпјҢеҺ»ж–№ж—¶ж—¶ж·»еҠ еҗ§пјҒ</p></div>';document.getElementById('submitBtn').style.display='none';return;evengrid.innerHTML=dishes.map(d=>{const qty=orders[d.id]||0;const th=d.img?`<img src="${d.img}" alt="${d.name}">`:(d.emoji||'рҹҚң');return `<div class="card-dish"><div class="thumb">${th}</div><div class="dinfo"><div class="dname">${d.name}</div>${d.prefs&&d.prefs.length?'<div class="dprefs">'+d.prefs.join(' В· ')+'</div>':''}</div><div class="qty-row"><button class="qbtn m" onclick="changeQty('${d.id}',-1)">вҲ’</button><span class="qnum" id="qty-${d.id}">${qty}</span><button class="qbtn p" onclick="changeQty('${d.id}',1)">+</button></div></div>`;}).join('');updateSubmitBtn();}
function changeQty(id,d){orders[id]=Math.max(0,(orders[id]||0)+d);const e=document.getElementById('qty-'+id);if(e)e.textContent=orders[id];updateSubmitBtn();}
function updateSubmitBtn(){const t=Object.values(orders).reduce((a,b)=>a+b,0);document.getElementById('submitBtn').style.display=t>0?'block':'none';}
async function submitOrder(){const items=dishes.filter(d=>orders[d.id]>0).map(d=>d.name+' x'+orders[d.id]).join('гҖҒ');if(!items)return;try{await fetch(`https://sctapi.ftqq.com/${getSK()}.send`,{method:'POST'headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'title=KellyиҰҒеҗғпјҡ'+encodeURIComponent(items)+'&desp='+encodeURIComponent(items)});showToast('вң… е·ІйҖҡз§ҘпјҒ');orders={};renderMenu();}catch(e){showToast('еҸ‘йҖҒеӨұиҙҘ');}}
function renderAdmin(){const l=document.getElementById('dishListAdmin');if(!dishes.length){l.innerHTML='<div class="empty"><span class="empty-icon">рҹҚҝпёҸ</span><p>йҖҡжІЎжңүиҸңпјҢеҝ«еҺ»ж·»еҠ еҗ§пјҒ</p></div>';return;e}l.innerHTML=dishes.map(d=>{const th=d.img?`<img src="${d.img}" alt="${d.name}">`:(d.emoji||'рҹҚң');return `<div class="dai"><div class="da-thumb">${th}</div><div class="da-info"><div class="da-name">${d.name}</div><div class="da-prefs">${d.prefs&&d.prefs.length?d.prefs.join(' В· '):'дәҢеҒҸеҘҪйҖүйЎ№'}</div></div><button class="btn-del" onclick="deleteDish('${d.id}')">рҹ—‘пёҸ</button></div>`;}).join('');}
function buildEmojiRow(sel){document.getElementById('emojiRow').innerHTML=EMOJIS.map(e=>`<span class="eopt${e===sel?' sel':''}" onclick="selectEmoji(this)">${e}</span>`).join('');}
function selectEmoji(el){document.querySelectorAll('#emojiRow .eopt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');pendingImg=null;document.getElementById('imgPreview').style.display='none';document.getElementById('uploadLabel').textContent='жҲ–дёҠдј еӣҫзүҮ';document.getElementById('imgFileInput').value='';}
function getSelectedEmoji(){return document.querySelector('#emojiRow .eopt.sel')?.textContent||'рҹҚң';}
function handleImgUpload(input){if(!input.files||!input.files[0])return;const reader=new FileReader();reader.onload=function(e){const img=new Image();img.onload=function(){const c=document.createElement('canvas');const M=400;let w=img.width,h=img.height;if(w>h){ if(w>M){h=h*M/w;w=M;}}else{if(h>M){w=w*M/h;h=M;}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);pendingImg=c.toDataURL('image/jpeg',0.7);const p=document.getElementById('imgPreview');p.src=pendingImg;p.style.display='block';document.getElementById('uploadLabel').textContent='е·ІдёҠдј еӣ»зҷҮ';document.querySelectorAll('#emojiRow .eopt').forEach(o=>o.classList.remove('sel'));};img.src=e.target.result;};reader.readAsDataURL(input.files[0]);}
function renderBuildPrefs(){document.getElementById('buildPrefsList').innerHTML=buildingPrefs.map((p,i)=>`<span class="ptag">${p}<span class="ptag-del" onclick="buildingPrefs.splice(${i},1);renderBuildPrefs()">Г—Oј/span></span>`).join('');}
function addPref(){const i=document.getElementById('prefInput');const v=i.value.trim();if(!v||buildingPrefs.includes(v)){i.value='';return;}buildingPrefs.push(v);renderBuildPrefs();i.value='';}
function quickAddPref(p){if(!buildingPrefs.includes(p)){buildingPrefs.push(p);renderBuildPrefs();}}
async function addDish(){const n=document.getElementById('dishName').value.trim();if(!n){showToast('иҜ·иҫ“е…ҘиҸңе“ҒеҗҚз·°');return;dishes.push({id:'d_'+Date.now(),name:n,emoji:getSelectedEmoji(),img:pendingImg,prefs:[...buildingPrefs]});document.getElementById('dishName').value='';pendingImg=null;buildingPrefs=[];document.getElementById('imgPreview').style.display='none';document.getElementById('uploadLabel').textContent='жҲ–дёҠдј еӣ»зҷҮ';document.getElementById('imgFileInput').value='';document.getElementById('buildPrefsList').innerHTML='';buildEmojiRow('рҹҚң');await saveToCloud();renderAdmin();showToast('вң… е·Іж·»еҠ пјҡ'+n);}
async function deleteDish(id){const d=dishes.find(x=>x.id===id);dishes=dishes.filter(x=>x.id!==id);await saveToCloud();renderAdmin();renderMenu();if(d)showToast('е·ІеҲ й©Өпјҡ'+d.name);}
function saveSK(){const v=document.getElementById('skInput').value.trim();if(!v){showToast('иҜ·иҫ“е…Ҙ SendKey');return;}localStorage.setItem(SK_KEY,v);document.getElementById('skStatus').textContent='вң… е·Ідҝқеӯҳ';showToast('SendKey е·Ідҝқеӯҳ');}
async function testSK(){const sk=document.getElementById('skInput').value.trim()||getSK();if(!sk){showToast('иҜ·е…Ҳиҫ“е…Ҙ SendKey');return;}await fetch(`https://sctapi.ftqq.com/${sk}.send`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'title=жөӢиҜ•жҺЁйҖҒ&desp=д»ҠеӨ©еҗғд»Җд№Ҳ App жҺЁйҖҒжөӢиҜ•жҲҗеҠҹпјҒ'}).catch(()=>null);showToast('вң… жөӢиҜ•жұЎиҠұе·ІеҗҢ');}
if(!localStorage.getItem(SK_KEY))localStorage.setItem(SK_KEY,DEFAULT_SK);
buildEmojiRow('рҹҚң');
loadFromCloud();
</script>
</body>
</html>
