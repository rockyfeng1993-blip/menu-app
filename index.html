<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>今天吃什么 🍜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Ma+Shan+Zheng&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink: #FF6B9D; --pink-light: #FFE8F2; --pink-mid: #FFB3D1; --pink-dark: #D44F7A;
  --cream: #FFF8F0; --text: #2D1520; --text-soft: #8A6070; --border: #F0C8D8;
  --card: #FFFFFF; --green: #5BAD6F; --shadow-sm: 0 2px 8px rgba(255,107,157,.10); --r: 20px;
}
body { font-family: 'Noto Serif SC', Georgia, serif; background: var(--cream); color: var(--text); min-height: 100vh; -webkit-tap-highlight-color: transparent; }

.bottom-nav { position: fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--border); display:flex; z-index:200; padding-bottom:env(safe-area-inset-bottom); box-shadow:0 -4px 20px rgba(255,107,157,.12); }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 8px 8px; border:none; background:none; cursor:pointer; color:var(--text-soft); font-size:11px; font-family:inherit; transition:color .2s; gap:4px; }
.nav-btn .nav-icon { font-size:22px; transition:transform .2s; }
.nav-btn.active { color:var(--pink); }
.nav-btn.active .nav-icon { transform:scale(1.15); }
